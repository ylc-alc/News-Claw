name: Daily News Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  news-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch RSS feeds
        run: |
          python scripts/fetch_rss.py

      - name: Process feeds into daily digest
        run: |
          python scripts/process_feeds.py

      - name: Build homepage
        run: |
          python scripts/build_site.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.json data/processed/*.json docs/index.html docs/archive.html docs/archive/*.html
          git commit -m "Update news data, homepage, and archive pages" || echo "No changes to commit"
          git push
