name: Daily News Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  generate-test-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate test file
        run: |
          mkdir -p data/processed
          echo "Workflow ran at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > data/processed/last-run.txt

      - name: Commit and push test file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/last-run.txt
          git commit -m "Update last-run test file" || echo "No changes to commit"
          git push
